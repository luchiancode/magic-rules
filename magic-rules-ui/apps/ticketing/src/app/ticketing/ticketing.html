<section class="ticket-list">
  <div class="ticket-header">
    <h1>Tickets</h1>
    <button class="btn-create">+ New Ticket</button>
  </div>

  <div class="ticket-table">
    <div class="table-head">
      <span class="col-id">ID</span>
      <span class="col-title">Title</span>
      <span class="col-status">Status</span>
      <span class="col-priority">Priority</span>
    </div>
    <div class="table-row">
      <span class="col-id">TKT-001</span>
      <span class="col-title">Setup CI/CD Pipeline</span>
      <span class="col-status"><span class="badge badge-open">Open</span></span>
      <span class="col-priority"><span class="badge badge-high">High</span></span>
    </div>
    <div class="table-row">
      <span class="col-id">TKT-002</span>
      <span class="col-title">Design Auth0 Login Flow</span>
      <span class="col-status"><span class="badge badge-progress">In Progress</span></span>
      <span class="col-priority"><span class="badge badge-medium">Medium</span></span>
    </div>
    <div class="table-row">
      <span class="col-id">TKT-003</span>
      <span class="col-title">Create Prisma Schema</span>
      <span class="col-status"><span class="badge badge-done">Done</span></span>
      <span class="col-priority"><span class="badge badge-low">Low</span></span>
    </div>
  </div>
</section>
